<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 作业助手 - 大学生编程学习工具</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🦉</span>
      <h1>AI 作业助手</h1>
    </div>
    <p class="subtitle">帮你理解代码，而不是替你写作业</p>
  </header>

  <main>
    <div class="api-key-bar" id="apiKeyBar">
      <div class="api-key-inner">
        <span class="api-key-label">🔑 DeepSeek API Key</span>
        <input type="password" id="apiKeyInput" placeholder="粘贴你的 DeepSeek API Key（sk-...），免费注册 deepseek.com">
        <button class="btn-small" id="btnSaveKey" onclick="saveApiKey()">保存</button>
        <button class="btn-small btn-ghost" id="btnToggleKey" onclick="toggleKeyVisibility()">👁</button>
        <span class="api-key-status" id="apiKeyStatus">未设置</span>
      </div>
      <p class="api-key-hint">Key 只存在你的浏览器里，不经过我们的服务器。DeepSeek 新用户免费额度够用几千次。</p>
    </div>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="debug">🐛 Bug 诊断</button>
      <button class="tab-btn" data-tab="review">🔍 代码审查</button>
      <button class="tab-btn" data-tab="explain">💡 思路讲解</button>
      <button class="tab-btn" data-tab="comment">📝 注释补全</button>
      <button class="tab-btn" data-tab="generate">✍️ 代码生成</button>
      <button class="tab-btn" data-tab="editor">💻 离线编辑器</button>
    </nav>

    <section class="tab-content active" id="tab-debug">
      <div class="input-group">
        <label>
          粘贴你的代码（包含报错信息）
          <textarea id="debug-code" placeholder="把代码和报错信息一起粘贴到这里&#10;&#10;例如：&#10;Traceback (most recent call last):&#10;  File &quot;test.py&quot;, line 3, in &lt;module&gt;&#10;    print(1/0)&#10;ZeroDivisionError: division by zero" rows="12"></textarea>
        </label>
      </div>
      <div class="lang-select">
        <label>编程语言：
          <select id="debug-lang">
            <option value="auto">自动检测</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="javascript">JavaScript</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="sql">SQL</option>
          </select>
        </label>
      </div>
      <button class="btn-primary" id="btn-debug" onclick="analyze('debug')">🔍 分析 Bug</button>
      <div class="result-box" id="result-debug"></div>
    </section>

    <section class="tab-content" id="tab-review">
      <div class="input-group">
        <label>
          粘贴你要审查的代码
          <textarea id="review-code" placeholder="粘贴完整代码文件内容" rows="12"></textarea>
        </label>
      </div>
      <div class="lang-select">
        <label>编程语言：
          <select id="review-lang">
            <option value="auto">自动检测</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="javascript">JavaScript</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="sql">SQL</option>
          </select>
        </label>
      </div>
      <button class="btn-primary" id="btn-review" onclick="analyze('review')">🔍 审查代码</button>
      <div class="result-box" id="result-review"></div>
    </section>

    <section class="tab-content" id="tab-explain">
      <div class="input-group">
        <label>
          粘贴题目描述
          <textarea id="explain-question" placeholder="粘贴题目完整内容&#10;&#10;例如：&#10;给定一个整数数组 nums 和一个整数目标值 target，请你在该数组中找出和为目标值 target 的那两个整数，并返回它们的数组下标。" rows="8"></textarea>
        </label>
      </div>
      <button class="btn-primary" id="btn-explain" onclick="analyze('explain')">💡 讲解思路</button>
      <div class="result-box" id="result-explain"></div>
    </section>

    <section class="tab-content" id="tab-generate">
      <div class="input-group">
        <label>
          粘贴题目描述，AI 帮你写代码
          <textarea id="generate-question" placeholder="把题目完整粘贴到这里&#10;&#10;例如：&#10;编写一个Python函数，接收一个字符串，判断它是否为回文。忽略大小写和非字母数字字符。&#10;&#10;你也可以指定语言、要求、限制条件等。" rows="8"></textarea>
        </label>
      </div>
      <div class="lang-select">
        <label>目标语言：
          <select id="generate-lang">
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="javascript">JavaScript</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="sql">SQL</option>
          </select>
        </label>
      </div>
      <button class="btn-primary" id="btn-generate" onclick="analyze('generate')">✍️ 生成代码</button>
      <div class="result-box" id="result-generate"></div>
    </section>

    <section class="tab-content" id="tab-editor">
      <div class="editor-toolbar">
        <select id="editor-lang" onchange="onEditorLangChange()">
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="javascript">JavaScript</option>
          <option value="cpp">C++</option>
          <option value="c">C</option>
          <option value="sql">SQL</option>
          <option value="text">纯文本</option>
        </select>
        <button class="btn-small" onclick="runCode()" title="仅支持 JavaScript">▶ 运行</button>
        <button class="btn-small btn-ghost" onclick="downloadCode()">⬇ 下载</button>
        <button class="btn-small btn-ghost" onclick="clearEditor()">🗑 清空</button>
        <span class="editor-status" id="editorStatus">已自动保存</span>
      </div>
      <div class="editor-body">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea id="codeEditor" placeholder="在这里写代码...&#10;&#10;• 断网也能写，内容自动保存到浏览器&#10;• Tab 键缩进，Shift+Tab 取消缩进&#10;• 选 JavaScript 可以点「运行」直接执行&#10;• 点「下载」保存为文件" spellcheck="false"></textarea>
      </div>
      <div class="editor-output" id="editorOutput" style="display:none">
        <div class="output-header">
          <span>▶ 运行输出</span>
          <button class="btn-small btn-ghost" onclick="closeOutput()">✕</button>
        </div>
        <pre id="outputContent"></pre>
      </div>
    </section>
  </main>

  <footer>
    <p>Built with ❤️ for B站 AI创造公开赛 | <a href="https://github.com/Wy1306/ai-homework-helper" target="_blank">GitHub</a></p>
    <p class="disclaimer">⚠️ 本工具旨在帮你理解代码逻辑，请不要直接复制答案提交作业</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
